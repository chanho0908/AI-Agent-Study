<svg width="720" height="640" viewBox="0 0 720 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Noto Sans KR', sans-serif">

  <!-- Background -->
  <rect width="720" height="640" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#94a3b8" font-size="15" font-weight="700" letter-spacing="1">에이전트 루프 (Agentic Loop)</text>

  <!-- ── Step 1: 사용자 입력 ── -->
  <rect x="260" y="55" width="200" height="48" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="360" y="75" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">💬 사용자 입력</text>
  <text x="360" y="93" text-anchor="middle" fill="#475569" font-size="11">"이 파일의 버그 고쳐줘"</text>

  <!-- arrow down -->
  <line x1="360" y1="103" x2="360" y2="123" stroke="#475569" stroke-width="1.5"/>
  <polygon points="360,127 354,117 366,117" fill="#475569"/>

  <!-- ── Step 2: LLM 호출 ── -->
  <rect x="190" y="127" width="340" height="58" rx="10" fill="#1e1a3e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="150" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">🤖 LLM 호출</text>
  <text x="360" y="168" text-anchor="middle" fill="#475569" font-size="11">시스템 프롬프트 + 툴 목록 + 메모리 + 입력</text>

  <!-- arrow down -->
  <line x1="360" y1="185" x2="360" y2="205" stroke="#475569" stroke-width="1.5"/>
  <polygon points="360,209 354,199 366,199" fill="#475569"/>

  <!-- ── Step 3: LLM 응답 (diamond) ── -->
  <polygon points="360,209 460,254 360,299 260,254" fill="#1a2535" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="360" y="249" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">LLM 응답</text>
  <text x="360" y="267" text-anchor="middle" fill="#7dd3fc" font-size="11">툴 호출?</text>

  <!-- Branch LEFT: NO (텍스트만) -->
  <line x1="260" y1="254" x2="120" y2="254" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="116,254 126,248 126,260" fill="#22c55e"/>
  <text x="188" y="244" text-anchor="middle" fill="#86efac" font-size="11">NO</text>

  <rect x="40" y="226" width="76" height="56" rx="10" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="78" y="249" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">사용자에게</text>
  <text x="78" y="265" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">반환 ✅</text>

  <!-- Branch RIGHT: YES (툴 호출) -->
  <line x1="460" y1="254" x2="560" y2="254" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="564,254 554,248 554,260" fill="#f87171"/>
  <text x="510" y="244" text-anchor="middle" fill="#fca5a5" font-size="11">YES</text>

  <rect x="564" y="226" width="110" height="56" rx="10" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="619" y="249" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">툴 호출</text>
  <text x="619" y="265" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">요청 수신</text>

  <!-- ── Step 4: 권한 확인 ── -->
  <line x1="619" y1="282" x2="619" y2="322" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="619,326 613,316 625,316" fill="#f87171"/>

  <rect x="564" y="326" width="110" height="48" rx="10" fill="#2e1e1a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="619" y="346" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="600">🔐 권한 확인</text>
  <text x="619" y="362" text-anchor="middle" fill="#475569" font-size="10">허용 여부 판단</text>

  <!-- ── Step 5: Pre Hook ── -->
  <line x1="619" y1="374" x2="619" y2="410" stroke="#fb923c" stroke-width="1.5"/>
  <polygon points="619,414 613,404 625,404" fill="#fb923c"/>

  <rect x="564" y="414" width="110" height="48" rx="10" fill="#2e2a1a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="619" y="434" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">⚡ PreToolUse</text>
  <text x="619" y="450" text-anchor="middle" fill="#475569" font-size="10">훅 실행</text>

  <!-- ── Step 6: 실제 툴 실행 ── -->
  <line x1="619" y1="462" x2="619" y2="498" stroke="#fbbf24" stroke-width="1.5"/>
  <polygon points="619,502 613,492 625,492" fill="#fbbf24"/>

  <rect x="554" y="502" width="130" height="48" rx="10" fill="#1a2535" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="619" y="523" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">🔧 툴 실행</text>
  <text x="619" y="539" text-anchor="middle" fill="#475569" font-size="10">Read / Bash / Edit ...</text>

  <!-- ── Step 7: Post Hook ── -->
  <line x1="619" y1="550" x2="619" y2="582" stroke="#38bdf8" stroke-width="1.5"/>
  <polygon points="619,586 613,576 625,576" fill="#38bdf8"/>

  <rect x="564" y="586" width="110" height="40" rx="10" fill="#2e2a1a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="619" y="611" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">⚡ PostToolUse 훅</text>

  <!-- ── 결과를 LLM으로 돌려보내는 화살표 ── -->
  <!-- 아래로 내려가서 왼쪽으로 꺾어 LLM 호출 박스로 -->
  <line x1="564" y1="606" x2="80" y2="606" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="80" y1="606" x2="80" y2="156" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="80" y1="156" x2="190" y2="156" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"/>
  <polygon points="190,156 180,150 180,162" fill="#a78bfa"/>

  <!-- Loop label -->
  <rect x="30" y="368" width="92" height="28" rx="6" fill="#1e1a3e"/>
  <text x="76" y="386" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">↩ 결과 전달</text>
  <text x="76" y="400" text-anchor="middle" fill="#6b7280" font-size="10">다시 루프</text>

  <!-- Caption -->
  <text x="360" y="628" text-anchor="middle" fill="#475569" font-size="11">LLM이 툴을 더 이상 호출하지 않을 때까지 반복된다</text>

</svg>
