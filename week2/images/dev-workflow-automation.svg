  <text x="652" y="488" fill="#6b7280" font-family="monospace" font-size="11">← /pr</text>

  <rect x="800" y="416" width="140" height="98" rx="6" fill="#0a2a14" stroke="#15803d" stroke-width="1"/>
  <text x="870" y="444" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">🔍 reviewer</text>
  <text x="812" y="468" fill="#86efac" font-family="monospace" font-size="12">코드 리뷰</text>
  <text x="812" y="488" fill="#6b7280" font-family="monospace" font-size="11">Dove Letter 기준</text>

