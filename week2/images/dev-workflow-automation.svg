  <rect x="60" y="185" width="880" height="156" rx="10" fill="url(#layer1Grad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="82" y="213" fill="#93c5fd" font-family="monospace" font-size="13" font-weight="bold">LAYER 1</text>
  <text x="180" y="213" fill="#60a5fa" font-family="monospace" font-size="16" font-weight="bold">CLAUDE.md</text>
  <text x="780" y="213" fill="#3b82f6" font-family="monospace" font-size="12" text-anchor="middle">세션 시작 시 자동 로드</text>
  <line x1="80" y1="221" x2="920" y2="221" stroke="#1e40af" stroke-width="1"/>

