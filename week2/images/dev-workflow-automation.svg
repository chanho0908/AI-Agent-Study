  <text x="500" y="893" fill="#fbbf24" font-family="monospace" font-size="15" font-weight="bold" text-anchor="middle">✅ 결과</text>
  <text x="500" y="917" fill="#fde68a" font-family="monospace" font-size="13" text-anchor="middle">내가 코드를 직접 작성하지 않아도 컨벤션이 지켜진다</text>

  <!-- DIARY FEEDBACK LOOP -->
