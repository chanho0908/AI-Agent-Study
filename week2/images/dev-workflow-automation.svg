  <rect x="80" y="231" width="400" height="96" rx="6" fill="#0f2040" stroke="#1d4ed8" stroke-width="1"/>
  <text x="280" y="260" fill="#93c5fd" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">📋 라우팅 규칙</text>
  <text x="94" y="280" fill="#bfdbfe" font-family="monospace" font-size="12">구현 / 수정 / 추가 / 고쳐줘</text>
  <text x="94" y="298" fill="#60a5fa" font-family="monospace" font-size="13" font-weight="bold">→ 반드시 implementer 에이전트 사용</text>
  <text x="94" y="316" fill="#6b7280" font-family="monospace" font-size="11">코드 한 줄도 직접 작성 금지</text>

  <rect x="500" y="231" width="400" height="96" rx="6" fill="#0f2040" stroke="#1d4ed8" stroke-width="1"/>
  <text x="700" y="260" fill="#93c5fd" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">🏗️ 아키텍처 컨텍스트</text>
  <text x="514" y="280" fill="#bfdbfe" font-family="monospace" font-size="12">• Clean Architecture (Domain→Data→UI)</text>
  <text x="514" y="298" fill="#bfdbfe" font-family="monospace" font-size="12">• MVI (UiState / UiEvent / SideEffect)</text>
  <text x="514" y="316" fill="#bfdbfe" font-family="monospace" font-size="12">• Koin DI, Kotlin Coroutines</text>

  <!-- Arrow (Layer1 bottom=341) -->
  <line x1="500" y1="341" x2="500" y2="365" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

