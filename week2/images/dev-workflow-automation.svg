  <rect x="60" y="368" width="880" height="262" rx="10" fill="url(#layer2Grad)" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="82" y="396" fill="#86efac" font-family="monospace" font-size="13" font-weight="bold">LAYER 2</text>
  <text x="180" y="396" fill="#4ade80" font-family="monospace" font-size="16" font-weight="bold">.claude/agents/</text>
