  <rect x="80" y="416" width="220" height="184" rx="8" fill="#0a2a14" stroke="#16a34a" stroke-width="2" filter="url(#glow)"/>
  <text x="190" y="444" fill="#4ade80" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">🔨 implementer</text>
