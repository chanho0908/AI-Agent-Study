<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1010" width="1000" height="1010">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2e"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1a5f"/>
      <stop offset="100%" style="stop-color:#6b21a8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1010" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="500" y="46" fill="#f0f6fc" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle">Claude Code 개발 워크플로우 자동화</text>
  <text x="500" y="70" fill="#8b949e" font-family="monospace" font-size="14" text-anchor="middle">3-Layer Automation System</text>
  <line x1="60" y1="84" x2="940" y2="84" stroke="#30363d" stroke-width="1"/>

  <!-- USER REQUEST -->
  <rect x="350" y="100" width="300" height="58" rx="29" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <text x="500" y="124" fill="#fff8e1" font-family="monospace" font-size="15" font-weight="bold" text-anchor="middle">👤 사용자 요청</text>
  <text x="500" y="145" fill="#fde68a" font-family="monospace" font-size="13" text-anchor="middle">"무한 스크롤 추가해줘"</text>

  <line x1="500" y1="158" x2="500" y2="182" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

