<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" width="900" height="820">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="layer1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="layer2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2e"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
    <linearGradient id="layer3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1a5f"/>
      <stop offset="100%" style="stop-color:#6b21a8"/>
    </linearGradient>
    <linearGradient id="hookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1a2a"/>
      <stop offset="100%" style="stop-color:#9f1239"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f43f5e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" fill="#f0f6fc" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">Claude Code 개발 워크플로우 자동화</text>
  <text x="450" y="62" fill="#8b949e" font-family="monospace" font-size="12" text-anchor="middle">3-Layer Automation System</text>
  <line x1="60" y1="75" x2="840" y2="75" stroke="#30363d" stroke-width="1"/>

  <!-- ===== USER REQUEST ===== -->
  <rect x="330" y="95" width="240" height="50" rx="25" fill="url(#claudeGrad)" filter="url(#shadow)"/>
  <text x="450" y="115" fill="#fff8e1" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">👤 사용자 요청</text>
  <text x="450" y="133" fill="#fde68a" font-family="monospace" font-size="11" text-anchor="middle">"무한 스크롤 추가해줘"</text>

  <!-- Arrow down to Layer 1 -->
  <line x1="450" y1="145" x2="450" y2="168" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ===== LAYER 1: CLAUDE.md ===== -->
  <rect x="60" y="170" width="780" height="120" rx="10" fill="url(#layer1Grad)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="195" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold">LAYER 1</text>
  <text x="160" y="195" fill="#60a5fa" font-family="monospace" font-size="13" font-weight="bold">CLAUDE.md</text>
  <text x="710" y="195" fill="#3b82f6" font-family="monospace" font-size="10" text-anchor="middle">세션 시작 시 자동 로드</text>

  <line x1="80" y1="202" x2="820" y2="202" stroke="#1e40af" stroke-width="1"/>

  <!-- Rule boxes inside Layer 1 -->
  <rect x="80" y="212" width="350" height="65" rx="6" fill="#0f2040" stroke="#1d4ed8" stroke-width="1"/>
  <text x="255" y="230" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">📋 라우팅 규칙</text>
  <text x="90" y="248" fill="#bfdbfe" font-family="monospace" font-size="10">구현/수정/추가/고쳐줘 →</text>
  <text x="90" y="263" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">  반드시 implementer 에이전트 사용</text>
  <text x="90" y="278" fill="#6b7280" font-family="monospace" font-size="9">코드 한 줄도 직접 작성 금지</text>

  <rect x="450" y="212" width="350" height="65" rx="6" fill="#0f2040" stroke="#1d4ed8" stroke-width="1"/>
  <text x="625" y="230" fill="#93c5fd" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">🏗️ 아키텍처 컨텍스트</text>
  <text x="460" y="248" fill="#bfdbfe" font-family="monospace" font-size="10">• Clean Architecture (Domain→Data→UI)</text>
  <text x="460" y="263" fill="#bfdbfe" font-family="monospace" font-size="10">• MVI (UiState / UiEvent / SideEffect)</text>
  <text x="460" y="278" fill="#bfdbfe" font-family="monospace" font-size="10">• Koin DI, Kotlin Coroutines</text>

  <!-- Arrow down to Layer 2 -->
  <line x1="450" y1="290" x2="450" y2="313" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== LAYER 2: AGENTS ===== -->
  <rect x="60" y="315" width="780" height="200" rx="10" fill="url(#layer2Grad)" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="340" fill="#86efac" font-family="monospace" font-size="11" font-weight="bold">LAYER 2</text>
  <text x="160" y="340" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold">.claude/agents/</text>
  <text x="710" y="340" fill="#22c55e" font-family="monospace" font-size="10" text-anchor="middle">역할별 전문 에이전트</text>

  <line x1="80" y1="347" x2="820" y2="347" stroke="#166534" stroke-width="1"/>

  <!-- Agent boxes -->
  <!-- implementer - highlighted -->
  <rect x="80" y="358" width="200" height="140" rx="8" fill="#0a2a14" stroke="#16a34a" stroke-width="2" filter="url(#glow)"/>
  <text x="180" y="378" fill="#4ade80" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">🔨 implementer</text>
  <text x="90" y="398" fill="#a7f3d0" font-family="monospace" font-size="9">코드 구현 전담</text>
  <text x="90" y="413" fill="#6ee7b7" font-family="monospace" font-size="9">• 브랜치 검증 / Issue 생성</text>
  <text x="90" y="428" fill="#6ee7b7" font-family="monospace" font-size="9">• 컨벤션 강제 적용</text>
  <text x="90" y="443" fill="#6ee7b7" font-family="monospace" font-size="9">• get/set 금지, 50줄 제한</text>
  <text x="90" y="458" fill="#6ee7b7" font-family="monospace" font-size="9">• 작업 회고 / diary 기록</text>
  <rect x="80" y="487" width="200" height="20" rx="4" fill="#14532d"/>
  <text x="180" y="500" fill="#bbf7d0" font-family="monospace" font-size="9" text-anchor="middle">← /impl, /plan-impl</text>

  <!-- Other agents -->
  <rect x="297" y="358" width="120" height="70" rx="6" fill="#0a2a14" stroke="#15803d" stroke-width="1"/>
  <text x="357" y="378" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">🧪 tester</text>
  <text x="307" y="398" fill="#86efac" font-family="monospace" font-size="9">테스트 작성</text>
  <text x="307" y="413" fill="#6b7280" font-family="monospace" font-size="9">Unit / UI Test</text>

  <rect x="427" y="358" width="120" height="70" rx="6" fill="#0a2a14" stroke="#15803d" stroke-width="1"/>
  <text x="487" y="378" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">📦 committer</text>
  <text x="437" y="398" fill="#86efac" font-family="monospace" font-size="9">커밋 메시지 작성</text>
  <text x="437" y="413" fill="#6b7280" font-family="monospace" font-size="9">← /commit</text>

  <rect x="557" y="358" width="120" height="70" rx="6" fill="#0a2a14" stroke="#15803d" stroke-width="1"/>
  <text x="617" y="378" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">🚀 pr-creator</text>
  <text x="567" y="398" fill="#86efac" font-family="monospace" font-size="9">PR 자동 생성</text>
  <text x="567" y="413" fill="#6b7280" font-family="monospace" font-size="9">← /pr</text>

  <rect x="687" y="358" width="143" height="70" rx="6" fill="#0a2a14" stroke="#15803d" stroke-width="1"/>
  <text x="758" y="378" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">🔍 reviewer</text>
  <text x="697" y="398" fill="#86efac" font-family="monospace" font-size="9">코드 리뷰</text>
  <text x="697" y="413" fill="#6b7280" font-family="monospace" font-size="9">Dove Letter 기준</text>

  <!-- Second row agents -->
  <rect x="297" y="438" width="120" height="50" rx="6" fill="#0a2a14" stroke="#15803d" stroke-width="1"/>
  <text x="357" y="458" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">⚡ perf-opt</text>
  <text x="307" y="475" fill="#6b7280" font-family="monospace" font-size="9">성능 최적화</text>

  <!-- Arrow down to Layer 3 -->
  <line x1="450" y1="515" x2="450" y2="538" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- ===== LAYER 3: HOOKS ===== -->
  <rect x="60" y="540" width="780" height="130" rx="10" fill="url(#layer3Grad)" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="565" fill="#d8b4fe" font-family="monospace" font-size="11" font-weight="bold">LAYER 3</text>
  <text x="160" y="565" fill="#c084fc" font-family="monospace" font-size="13" font-weight="bold">settings.local.json — Hooks</text>
  <text x="710" y="565" fill="#a855f7" font-family="monospace" font-size="10" text-anchor="middle">시스템 레벨 강제</text>

  <line x1="80" y1="572" x2="820" y2="572" stroke="#6b21a8" stroke-width="1"/>

  <!-- Hook boxes -->
  <rect x="80" y="582" width="355" height="75" rx="6" fill="#1e0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="257" y="600" fill="#c084fc" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">PostToolUse: Edit | Write</text>
  <text x="90" y="618" fill="#ddd6fe" font-family="monospace" font-size="10">트리거: .kt 파일 수정 시</text>
  <text x="90" y="635" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">→ ktlintFormat 자동 실행</text>
  <text x="90" y="650" fill="#6b7280" font-family="monospace" font-size="9">LLM이 포맷을 신경 쓸 필요 없음</text>

  <rect x="455" y="582" width="355" height="75" rx="6" fill="#1e0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="632" y="600" fill="#c084fc" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">PreToolUse: git commit</text>
  <text x="465" y="618" fill="#ddd6fe" font-family="monospace" font-size="10">트리거: 커밋 명령 직전</text>
  <text x="465" y="635" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">→ ktlintCheck 자동 실행</text>
  <text x="465" y="650" fill="#6b7280" font-family="monospace" font-size="9">위반 코드는 커밋 자체가 불가</text>

  <!-- ===== RESULT ===== -->
  <line x1="450" y1="670" x2="450" y2="693" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="200" y="695" width="500" height="55" rx="10" fill="#1a1000" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="718" fill="#fbbf24" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">✅ 결과</text>
  <text x="450" y="737" fill="#fde68a" font-family="monospace" font-size="11" text-anchor="middle">내가 코드를 직접 작성하지 않아도 컨벤션이 지켜진다</text>

  <!-- ===== DIARY FEEDBACK LOOP ===== -->
  <rect x="680" y="695" width="180" height="80" rx="8" fill="#1a1000" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="770" y="718" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">📓 diary 피드백 루프</text>
  <text x="690" y="735" fill="#fde68a" font-family="monospace" font-size="9">시행착오 기록</text>
  <text x="690" y="750" fill="#fde68a" font-family="monospace" font-size="9">→ 에이전트 프롬프트 개선</text>
  <text x="690" y="765" fill="#fde68a" font-family="monospace" font-size="9">→ 같은 실수 반복 방지</text>
  <!-- diary arrow back up to agents -->
  <path d="M 770 695 Q 870 600 830 430" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Footer -->
  <line x1="60" y1="790" x2="840" y2="790" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="808" fill="#484f58" font-family="monospace" font-size="10" text-anchor="middle">chanho0908 · AI Agent Study Week 2 · 2026</text>
</svg>
