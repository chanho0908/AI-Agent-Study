  <rect x="80" y="706" width="400" height="116" rx="6" fill="#1e0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="280" y="732" fill="#c084fc" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">PostToolUse: Edit | Write</text>
  <text x="94" y="756" fill="#ddd6fe" font-family="monospace" font-size="12">트리거: .kt 파일 수정 시</text>
  <text x="94" y="778" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">→ ktlintFormat 자동 실행</text>
  <text x="94" y="800" fill="#6b7280" font-family="monospace" font-size="11">LLM이 포맷을 신경 쓸 필요 없음</text>

  <rect x="500" y="706" width="400" height="116" rx="6" fill="#1e0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="700" y="732" fill="#c084fc" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">PreToolUse: git commit</text>
  <text x="514" y="756" fill="#ddd6fe" font-family="monospace" font-size="12">트리거: 커밋 명령 직전</text>
  <text x="514" y="778" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">→ ktlintCheck 자동 실행</text>
  <text x="514" y="800" fill="#6b7280" font-family="monospace" font-size="11">위반 코드는 커밋 자체가 불가</text>

  <!-- Arrow (Layer3 bottom=837) -->
  <line x1="500" y1="837" x2="500" y2="861" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

