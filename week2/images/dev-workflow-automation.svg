  <text x="869" y="890" fill="#fbbf24" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">📓 diary 피드백 루프</text>
  <text x="790" y="912" fill="#fde68a" font-family="monospace" font-size="11">시행착오 기록</text>
  <text x="790" y="932" fill="#fde68a" font-family="monospace" font-size="11">→ 에이전트 프롬프트 개선</text>
  <text x="790" y="952" fill="#fde68a" font-family="monospace" font-size="11">→ 같은 실수 반복 방지</text>
  <path d="M 869 864 Q 960 740 940 560" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Footer -->
