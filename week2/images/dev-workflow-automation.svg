  <text x="82" y="686" fill="#d8b4fe" font-family="monospace" font-size="13" font-weight="bold">LAYER 3</text>
  <text x="180" y="686" fill="#c084fc" font-family="monospace" font-size="16" font-weight="bold">settings.local.json — Hooks</text>
  <text x="780" y="686" fill="#a855f7" font-family="monospace" font-size="12" text-anchor="middle">시스템 레벨 강제</text>
  <line x1="80" y1="694" x2="920" y2="694" stroke="#6b21a8" stroke-width="1"/>

