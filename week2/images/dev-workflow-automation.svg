  <text x="394" y="554" fill="#4ade80" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">⚡ perf-opt</text>
  <text x="332" y="577" fill="#6b7280" font-family="monospace" font-size="11">성능 최적화</text>

