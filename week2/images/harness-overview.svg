<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', 'Noto Sans KR', sans-serif">

  <!-- Background -->
  <rect width="720" height="520" fill="#0f1117" rx="16"/>

  <!-- Harness outer border -->
  <rect x="20" y="20" width="680" height="480" rx="14" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8 4" opacity="0.7"/>

  <!-- Harness label -->
  <rect x="270" y="10" width="180" height="26" rx="6" fill="#1e3a5f"/>
  <text x="360" y="27" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700" letter-spacing="1">하네스 (Harness)</text>

  <!-- ── Center: LLM ── -->
  <rect x="270" y="200" width="180" height="90" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="360" y="238" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">LLM</text>
  <text x="360" y="260" text-anchor="middle" fill="#64748b" font-size="12">(Claude)</text>
  <text x="360" y="278" text-anchor="middle" fill="#475569" font-size="11">텍스트 → 텍스트</text>

  <!-- ── Top: 시스템 프롬프트 ── -->
  <rect x="260" y="48" width="200" height="72" rx="10" fill="#1a2e1a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="76" fill="#86efac" font-size="13" font-weight="700">📋 시스템 프롬프트</text>
  <text x="290" y="95" fill="#6b7280" font-size="11">• Agent 역할 / 행동 원칙</text>
  <text x="290" y="110" fill="#6b7280" font-size="11">• 톤·스타일 / 환경 정보</text>
  <!-- connector -->
  <line x1="360" y1="120" x2="360" y2="200" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <polygon points="360,200 355,190 365,190" fill="#22c55e" opacity="0.7"/>

  <!-- ── Bottom: 에이전트 루프 ── -->
  <rect x="260" y="370" width="200" height="72" rx="10" fill="#1e1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="290" y="398" fill="#c4b5fd" font-size="13" font-weight="700">🔄 에이전트 루프</text>
  <text x="290" y="418" fill="#6b7280" font-size="11">• LLM ↔ 툴 반복 실행</text>
  <text x="290" y="433" fill="#6b7280" font-size="11">• 종료 조건 판단</text>
  <!-- connector -->
  <line x1="360" y1="370" x2="360" y2="290" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <polygon points="360,290 355,300 365,300" fill="#a78bfa" opacity="0.7"/>

  <!-- ── Left-top: 툴 정의 ── -->
  <rect x="40" y="120" width="185" height="80" rx="10" fill="#1a1f2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="68" y="148" fill="#7dd3fc" font-size="13" font-weight="700">🔧 툴 정의</text>
  <text x="68" y="168" fill="#6b7280" font-size="11">• 할 수 있는 행동 목록</text>
  <text x="68" y="184" fill="#6b7280" font-size="11">• JSON Schema 형태</text>
  <!-- connector -->
  <line x1="225" y1="160" x2="270" y2="230" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <polygon points="270,230 263,222 273,220" fill="#38bdf8" opacity="0.7"/>

  <!-- ── Left-bottom: 메모리 ── -->
  <rect x="40" y="300" width="185" height="80" rx="10" fill="#1a2020" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="68" y="328" fill="#5eead4" font-size="13" font-weight="700">🧠 메모리</text>
  <text x="68" y="348" fill="#6b7280" font-size="11">• 파일 기반 장기 기억</text>
  <text x="68" y="364" fill="#6b7280" font-size="11">• 대화 간 컨텍스트 유지</text>
  <!-- connector -->
  <line x1="225" y1="340" x2="270" y2="265" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <polygon points="270,265 262,272 272,275" fill="#2dd4bf" opacity="0.7"/>

  <!-- ── Right-top: 권한 설정 ── -->
  <rect x="495" y="120" width="185" height="80" rx="10" fill="#2e1a1a" stroke="#f87171" stroke-width="1.5"/>
  <text x="520" y="148" fill="#fca5a5" font-size="13" font-weight="700">🔐 권한 설정</text>
  <text x="520" y="168" fill="#6b7280" font-size="11">• 허용 / 차단 범위</text>
  <text x="520" y="184" fill="#6b7280" font-size="11">• settings.json 관리</text>
  <!-- connector -->
  <line x1="495" y1="160" x2="450" y2="230" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <polygon points="450,230 447,220 457,222" fill="#f87171" opacity="0.7"/>

  <!-- ── Right-bottom: 훅 ── -->
  <rect x="495" y="300" width="185" height="80" rx="10" fill="#2e2a1a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="520" y="328" fill="#fde68a" font-size="13" font-weight="700">⚡ 훅 (Hooks)</text>
  <text x="520" y="348" fill="#6b7280" font-size="11">• 이벤트 기반 자동 실행</text>
  <text x="520" y="364" fill="#6b7280" font-size="11">• Pre / Post / Stop</text>
  <!-- connector -->
  <line x1="495" y1="340" x2="450" y2="265" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <polygon points="450,265 448,275 458,272" fill="#fbbf24" opacity="0.7"/>

  <!-- Caption -->
  <text x="360" y="505" text-anchor="middle" fill="#475569" font-size="11">LLM은 두뇌, 하네스는 몸통 — 하네스 없이는 Agent가 없다</text>

</svg>
